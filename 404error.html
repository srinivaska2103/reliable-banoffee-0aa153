<!DOCTYPE html>
<html lang="en" dir="ltr" id="root-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Assets/plane (1).png">
    <title>404 | Flight Off Course</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        secondary: '#0369a1',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-500 font-sans overflow-hidden">

    <div class="fixed top-6 right-6 flex gap-3 z-50">
        <button onclick="toggleDir()" class="px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-[10px] font-black shadow-sm dark:text-white hover:border-primary transition-all">
            <span id="dir-text">LTR</span>
        </button>
        <button onclick="toggleDarkMode()" class="p-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-500 shadow-sm hover:text-primary transition-all">
            <i class="fa-solid fa-circle-half-stroke"></i>
        </button>
    </div>

    <main class="relative min-h-screen flex items-center justify-center p-6 text-center">
        
        <div class="absolute inset-0 z-0 overflow-hidden">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 dark:bg-primary/10 rounded-full blur-[120px] animate-pulse"></div>
        </div>

        <div class="relative z-10 max-w-2xl w-full">
            
            <div class="relative inline-block mb-8 group">
                <i class="fa-solid fa-plane-slash text-8xl md:text-9xl text-slate-200 dark:text-slate-800 animate-float"></i>
                <div class="absolute inset-0 flex items-center justify-center">
                    <span class="text-6xl md:text-8xl font-black text-primary tracking-tighter opacity-80 group-hover:scale-110 transition-transform duration-500">404</span>
                </div>
            </div>

            <h1 class="text-4xl md:text-6xl font-black text-slate-900 dark:text-white mb-6 tracking-tighter uppercase italic">
                Radar Signal <span class="text-primary">Lost.</span>
            </h1>

            <p class="text-slate-500 dark:text-slate-400 text-lg mb-12 max-w-md mx-auto leading-relaxed">
                It seems you've drifted out of our coverage zone. The coordinates you entered don't exist in our flight database.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="index.html" class="w-full sm:w-auto px-10 py-5 bg-primary text-white font-black rounded-2xl uppercase tracking-widest text-xs shadow-xl shadow-primary/20 hover:bg-secondary hover:-translate-y-1 transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-compass"></i> Back to Flight Path
                </a>
                <button onclick="history.back()" class="w-full sm:w-auto px-10 py-5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white font-black rounded-2xl uppercase tracking-widest text-xs hover:border-primary transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-rotate-left"></i> Previous Heading
                </button>
            </div>

            <div class="mt-16 flex items-center justify-center gap-8 text-[10px] font-bold text-slate-300 dark:text-slate-700 uppercase tracking-[0.4em]">
                <span class="flex items-center gap-2"><i class="fa-solid fa-location-crosshairs"></i> LAT: --.---</span>
                <span class="flex items-center gap-2"><i class="fa-solid fa-location-crosshairs"></i> LONG: --.---</span>
            </div>
        </div>
    </main>

    <div class="fixed bottom-8 left-0 w-full px-8 flex justify-between items-center text-[10px] font-black text-slate-400 uppercase tracking-widest opacity-50">
        <span>Error Code: 0x404_NOT_FOUND</span>
        <span class="hidden md:block">SkyHigh Aviation Ground Support</span>
    </div>

    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(-5deg); }
        }
        .animate-float {
            animation: float 5s ease-in-out infinite;
        }

        /* Directional Transition */
        [dir="rtl"] .fa-rotate-left { transform: scaleX(-1); }
    </style>
 <script>
    // --- INITIALIZATION (Run on Page Load) ---
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Check and Apply Dark Mode
        if (localStorage.getItem('theme') === 'dark' || 
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // 2. Check and Apply Direction (LTR/RTL)
        const savedDir = localStorage.getItem('direction') || 'ltr';
        const htmlTag = document.getElementById('root-html'); // Ensure your <html> tag has this ID
        const dirText = document.getElementById('dir-text');

        if (htmlTag) {
            htmlTag.setAttribute('dir', savedDir);
        }
        if (dirText) {
            dirText.innerText = savedDir.toUpperCase();
        }
    });

    // --- TOGGLE FUNCTIONS ---

    function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        // Save choice to local storage
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function toggleDir() {
        const htmlTag = document.getElementById('root-html');
        const dirText = document.getElementById('dir-text');
        const currentDir = htmlTag.getAttribute('dir');
        
        const newDir = (currentDir === 'ltr') ? 'rtl' : 'ltr';
        
        // Apply
        htmlTag.setAttribute('dir', newDir);
        if (dirText) dirText.innerText = newDir.toUpperCase();
        
        // Save choice to local storage
        localStorage.setItem('direction', newDir);
    }
</script>

            html.setAttribute('dir', isLtr ? 'rtl' : 'ltr');
            document.getElementById('dir-text').innerText = isLtr ? 'RTL' : 'LTR';
        }
    </script> -->
</body>
</html>
