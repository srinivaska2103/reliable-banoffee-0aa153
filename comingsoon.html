<!DOCTYPE html>
<html lang="en" dir="ltr" id="root-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Assets/plane (1).png">
    <title>SkyHigh | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        secondary: '#0369a1',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-500 font-sans overflow-hidden">

    <div class="fixed top-6 right-6 flex gap-3 z-50">
        <button onclick="toggleDir()" class="px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-[10px] font-black shadow-sm dark:text-white hover:border-primary transition-all">
            <span id="dir-text">LTR</span>
        </button>
        <button onclick="toggleDarkMode()" class="p-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-500 shadow-sm hover:text-primary transition-all">
            <i class="fa-solid fa-circle-half-stroke"></i>
        </button>
    </div>

    <main class="relative min-h-screen flex items-center justify-center p-4">
        
        <div class="absolute inset-0 z-0">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[120px] animate-pulse"></div>
            <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-sky-400/10 rounded-full blur-[100px] animate-bounce-slow"></div>
        </div>

        <div class="max-w-3xl w-full text-center relative z-10">
           <a href="index.html">
             <div class="text-3xl font-black text-primary tracking-tighter mb-4 italic uppercase">
                SKY<span class="text-slate-400 dark:text-slate-600">HIGH</span>
            </div>
           </a>
           

            <h1 class="text-5xl md:text-7xl font-black text-slate-900 dark:text-white mb-6 tracking-tighter uppercase italic leading-tight">
                Our New Horizon <br> <span class="text-primary">Is Approaching.</span>
            </h1>

            <p class="text-slate-500 dark:text-slate-400 text-lg mb-12 max-w-xl mx-auto">
                We are currently upgrading our fleet and digital hangar. We'll be back in the air shortly with more breathtaking experiences.
            </p>

            <div class="grid grid-cols-4 gap-4 md:gap-8 mb-16">
                <div class="bg-white dark:bg-slate-900 p-4 md:p-6 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800">
                    <span id="days" class="block text-3xl md:text-5xl font-black text-primary">00</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Days</span>
                </div>
                <div class="bg-white dark:bg-slate-900 p-4 md:p-6 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800">
                    <span id="hours" class="block text-3xl md:text-5xl font-black text-primary">00</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Hours</span>
                </div>
                <div class="bg-white dark:bg-slate-900 p-4 md:p-6 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800">
                    <span id="minutes" class="block text-3xl md:text-5xl font-black text-primary">00</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mins</span>
                </div>
                <div class="bg-white dark:bg-slate-900 p-4 md:p-6 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800">
                    <span id="seconds" class="block text-3xl md:text-5xl font-black text-primary">00</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Secs</span>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
                <a href="index.html" class="px-10 py-5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black rounded-2xl uppercase tracking-widest text-xs shadow-2xl hover:bg-primary dark:hover:bg-primary dark:hover:text-white transition-all flex items-center gap-3">
                    <i class="fa-solid fa-house"></i> Go To Homepage
                </a>
                <div class="relative group">
                    <button class="px-8 py-5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white font-bold rounded-2xl uppercase tracking-widest text-xs hover:border-primary transition-all">
                        Notify Me
                    </button>
                    <div class="absolute -top-12 left-1/2 -translate-x-1/2 bg-primary text-white text-[10px] font-bold px-3 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
                        1,240 Pilots Subscribed
                    </div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-10 left-1/2 -translate-x-1/2 w-full max-w-sm px-6">
            <div class="flex items-center justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <span>Ground Check</span>
                <span class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                    Systems Operational
                </span>
            </div>
            <div class="mt-4 w-full h-1 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                <div class="h-full bg-primary animate-progress-load"></div>
            </div>
        </div>
    </main>

    <style>
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }
        .animate-bounce-slow { animation: bounce-slow 8s ease-in-out infinite; }

        @keyframes progress-load {
            from { width: 0%; }
            to { width: 75%; }
        }
        .animate-progress-load { animation: progress-load 4s ease-out forwards; }
    </style>

    <script>
        // --- SETTINGS LOGIC ---
        // function toggleDarkMode() {
        //     document.documentElement.classList.toggle('dark');
        // }

        // function toggleDir() {
        //     const html = document.getElementById('root-html');
        //     const isLtr = html.getAttribute('dir') === 'ltr';
        //     html.setAttribute('dir', isLtr ? 'rtl' : 'ltr');
        //     document.getElementById('dir-text').innerText = isLtr ? 'RTL' : 'LTR';
        // }

        // --- COUNTDOWN LOGIC ---
        const countdown = () => {
            const launchDate = new Date("Feb 25, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const gap = launchDate - now;

            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            document.getElementById('days').innerText = Math.floor(gap / day);
            document.getElementById('hours').innerText = Math.floor((gap % day) / hour);
            document.getElementById('minutes').innerText = Math.floor((gap % hour) / minute);
            document.getElementById('seconds').innerText = Math.floor((gap % minute) / second);
        };
        setInterval(countdown, 1000);
        countdown();
    </script>
     <script>
    // --- INITIALIZATION (Run on Page Load) ---
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Check and Apply Dark Mode
        if (localStorage.getItem('theme') === 'dark' || 
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // 2. Check and Apply Direction (LTR/RTL)
        const savedDir = localStorage.getItem('direction') || 'ltr';
        const htmlTag = document.getElementById('root-html'); // Ensure your <html> tag has this ID
        const dirText = document.getElementById('dir-text');

        if (htmlTag) {
            htmlTag.setAttribute('dir', savedDir);
        }
        if (dirText) {
            dirText.innerText = savedDir.toUpperCase();
        }
    });

    // --- TOGGLE FUNCTIONS ---

    function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        // Save choice to local storage
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function toggleDir() {
        const htmlTag = document.getElementById('root-html');
        const dirText = document.getElementById('dir-text');
        const currentDir = htmlTag.getAttribute('dir');
        
        const newDir = (currentDir === 'ltr') ? 'rtl' : 'ltr';
        
        // Apply
        htmlTag.setAttribute('dir', newDir);
        if (dirText) dirText.innerText = newDir.toUpperCase();
        
        // Save choice to local storage
        localStorage.setItem('direction', newDir);
    }
</script>
</body>
</html>
