<!DOCTYPE html>
<html lang="en" dir="ltr" id="root-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Assets/plane (1).png">
    <title>SkyHigh | Access Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        secondary: '#0369a1',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-500 font-sans">

    <div class="fixed top-6 right-6 flex gap-3 z-50">
        <button onclick="toggleDir()" class="px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-[10px] font-black shadow-sm dark:text-white hover:border-primary transition-all">
            <span id="dir-text">LTR</span>
        </button>
        <button onclick="toggleDarkMode()" class="p-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-500 shadow-sm hover:text-primary transition-all">
            <i class="fa-solid fa-circle-half-stroke"></i>
        </button>
    </div>

    <div class="min-h-screen flex items-center justify-center p-4">
        
        <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl shadow-primary/5 p-8 md:p-10 border border-slate-100 dark:border-slate-800 transition-all duration-500">
            
            <div class="text-center mb-8">
                <a href="index.html">
                <div class="text-2xl font-black text-primary tracking-tighter mb-2">SKY<span class="text-slate-400">HIGH</span></div>

                </a>
                <div id="form-header">
                    <h1 class="text-2xl font-bold dark:text-white">Welcome Back</h1>
                    <p class="text-sm text-slate-500 mt-1">Enter your flight credentials</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button class="flex items-center justify-center gap-2 py-3 border border-slate-200 dark:border-slate-700 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all group">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5" alt="Google">
                    <span class="text-xs font-bold dark:text-white">Google</span>
                </button>
                <button class="flex items-center justify-center gap-2 py-3 border border-slate-200 dark:border-slate-700 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all group">
                    <i class="fa-brands fa-apple text-lg dark:text-white"></i>
                    <span class="text-xs font-bold dark:text-white">Apple</span>
                </button>
            </div>

            <div class="relative mb-8 text-center">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100 dark:border-slate-800"></div></div>
                <span class="relative bg-white dark:bg-slate-900 px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Or Secure Login</span>
            </div>

            <div class="space-y-5">
                <form id="login-form" class="space-y-4">
                    <input type="email" placeholder="Email Address" class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl focus:ring-2 focus:ring-primary outline-none transition-all dark:text-white text-sm">
                    <input type="password" placeholder="Password" class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl focus:ring-2 focus:ring-primary outline-none transition-all dark:text-white text-sm">
                    <div class="flex justify-end">
                        <a href="#" class="text-[11px] font-bold text-primary hover:underline uppercase tracking-tighter">Forgot Password?</a>
                    </div>
                    <button type="button" class="w-full py-4 bg-primary text-white font-black rounded-2xl shadow-xl shadow-primary/20 hover:bg-secondary transition-all uppercase tracking-widest text-xs">
                        Authorize Login
                    </button>
                </form>

                <form id="signup-form" class="hidden space-y-4">
                    <input type="text" placeholder="Full Name" class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl focus:ring-2 focus:ring-primary outline-none transition-all dark:text-white text-sm">
                    <input type="email" placeholder="Email Address" class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl focus:ring-2 focus:ring-primary outline-none transition-all dark:text-white text-sm">
                    <input type="password" placeholder="Create Password" class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl focus:ring-2 focus:ring-primary outline-none transition-all dark:text-white text-sm">
                    <button type="button" class="w-full py-4 bg-primary text-white font-black rounded-2xl shadow-xl shadow-primary/20 hover:bg-secondary transition-all uppercase tracking-widest text-xs">
                        Create Pilot Account
                    </button>
                </form>
            </div>

            <p id="toggle-text" class="mt-8 text-center text-xs text-slate-500">
                New to the hangar? 
                <button onclick="switchForm('signup')" class="text-primary font-black hover:underline uppercase ml-1">Join Crew</button>
            </p>
        </div>
    </div>

    <script>
        // --- PREFERENCES LOGIC ---
        function applyPreferences() {
            // Theme
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') document.documentElement.classList.add('dark');
            
            // Direction
            const dir = localStorage.getItem('direction') || 'ltr';
            const html = document.getElementById('root-html');
            html.setAttribute('dir', dir);
            document.getElementById('dir-text').innerText = dir.toUpperCase();
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function toggleDir() {
            const html = document.getElementById('root-html');
            const currentDir = html.getAttribute('dir');
            const newDir = currentDir === 'ltr' ? 'rtl' : 'ltr';
            
            html.setAttribute('dir', newDir);
            document.getElementById('dir-text').innerText = newDir.toUpperCase();
            localStorage.setItem('direction', newDir);
        }

        // --- UI SWITCHER LOGIC ---
        function switchForm(mode) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const header = document.getElementById('form-header');
            const toggleText = document.getElementById('toggle-text');

            if (mode === 'signup') {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                header.innerHTML = '<h1 class="text-2xl font-bold dark:text-white">Start Expedition</h1><p class="text-sm text-slate-500 mt-1">Join the elite scenic flyers</p>';
                toggleText.innerHTML = 'Already a pilot? <button onclick="switchForm(\'login\')" class="text-primary font-black hover:underline uppercase ml-1">Login</button>';
            } else {
                signupForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                header.innerHTML = '<h1 class="text-2xl font-bold dark:text-white">Welcome Back</h1><p class="text-sm text-slate-500 mt-1">Enter your flight credentials</p>';
                toggleText.innerHTML = 'New to the hangar? <button onclick="switchForm(\'signup\')" class="text-primary font-black hover:underline uppercase ml-1">Join Crew</button>';
            }
        }

        // Run on load
        document.addEventListener('DOMContentLoaded', applyPreferences);
    </script>
</body>
</html>
